global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: viscacha
    # host.docker.internal resolves to the Docker host on Windows/macOS.
    # On Linux, use the host's LAN IP or add --add-host=host.docker.internal:host-gateway
    # to the prometheus service in docker-compose.yml.
    static_configs:
      - targets: ['host.docker.internal:8000']
